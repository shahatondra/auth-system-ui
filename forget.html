
<!DOCTYPE html>
<html>
    <head>
        <title>password reset page</title>
        <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }
    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f8f7f7f3;
    }
    .resetpassword-container{
        background:rgb(236, 238, 237);
        width:350px;
        padding:30px;
        border-radius:8px;
        box-shadow:0 8px 15px rgba(48, 163, 163, 0.959);
    }

    .resetpassword-container h2{
        margin-bottom:20px;
        text-align: center;
    }

    .resetpassword-container p{
        color:rgb(150, 147, 147);
        font-size:14px;
        margin-bottom:20px;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-size:14px;
    }

    input[type="text"],
    input[type="password"]{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:4px;
    
    }

    .options{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:15px;
        font-size:14px;
    }

    .options a{
        text-decoration:none;
        color:#0d6efd;
    }

    .resetpassword-btn{
        width:100%;
        padding:10px;
        border:none;
        border-radius:4px;
        background:#0d6efd;
        color:white;
        cursor:pointer;
    }

    .resetpassword-btn:hover {
        opacity: 0.7;
    }
</style>
</head>
<body>

<div class="resetpassword-container">

    <h2>Reset Password</h2>
    <form>

        <div class="form-group">
            <label>Email</label>
            <input type="text" placeholder="Enter e-mail">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
                <input type="password" placeholder="Enter Password">
        </div>

        <button type="submit" class="resetpassword-btn">
            Send Code
        </button>

    </form>
</div>

</body>
</html>
