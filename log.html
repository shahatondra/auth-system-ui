
<!DOCTYPE html>
<html>
    <head>
        <title>Login page</title>
        <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }
    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f8f7f7f3;
    }
    .login-container{
        background:rgb(236, 238, 237);
        width:350px;
        padding:30px;
        border-radius:8px;
        box-shadow:0 8px 15px rgba(48, 163, 163, 0.959);
    }

    .login-container h2{
        margin-bottom:20px;
        text-align: center;
    }

    .login-container p{
        color:rgb(150, 147, 147);
        font-size:14px;
        margin-bottom:20px;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-size:14px;
    }

    input[type="text"],
    input[type="password"]{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:4px;
    
    }

    .options{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:15px;
        font-size:14px;
    }

    .options a{
        text-decoration:none;
        color:#0d6efd;
    }

    .login-btn{
        width:100%;
        padding:10px;
        border:none;
        border-radius:4px;
        background:#0d6efd;
        color:white;
        cursor:pointer;
    }

    .login-btn:hover{
        background:#0b5ed7;
    }

    .signup{
        text-align:center;
        margin-top:15px;
        font-size:14px;
    }

    .signup a{
        color:#0d6efd;
        text-decoration:none;
    }
</style>
</head>
<body>

<div class="login-container">

    <h2>Log in</h2>
    <form>

        <div class="form-group">
            <label>Username or Email</label>
            <input type="text" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password">
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember me
            </label>

            <a href="forget.html">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">
            Log in
        </button>

    </form>
    <div class="signup">
        Don't have an account?
        <a href="sign_up.html">Sign up</a>
    </div>

</div>

</body>
</html>
